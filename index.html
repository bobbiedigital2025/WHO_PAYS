<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHO PAYS – Household Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>💸 WHO PAYS?</h1>
    <p class="subtitle">Household Income &amp; Expense Tracker for Roommates</p>
  </header>

  <main>
    <!-- Roommates -->
    <section id="roommates-section" class="card">
      <h2>🏠 Roommates</h2>
      <form id="roommate-form">
        <input type="text" id="roommate-name" placeholder="Roommate name" maxlength="50" required />
        <button type="submit">Add Roommate</button>
      </form>
      <ul id="roommate-list"></ul>
    </section>

    <!-- Add Income -->
    <section id="income-section" class="card">
      <h2>💰 Add Income</h2>
      <form id="income-form">
        <input type="text" id="income-desc" placeholder="Description (e.g. Paycheck)" maxlength="100" required />
        <input type="number" id="income-amount" placeholder="Amount ($)" min="0.01" step="0.01" required />
        <select id="income-who" required>
          <option value="">-- Select Roommate --</option>
        </select>
        <input type="date" id="income-date" required />
        <button type="submit">Add Income</button>
      </form>
    </section>

    <!-- Add Expense -->
    <section id="expense-section" class="card">
      <h2>🧾 Add Expense</h2>
      <form id="expense-form">
        <input type="text" id="expense-desc" placeholder="Description (e.g. Groceries)" maxlength="100" required />
        <input type="number" id="expense-amount" placeholder="Amount ($)" min="0.01" step="0.01" required />
        <select id="expense-who" required>
          <option value="">-- Who Paid? --</option>
        </select>
        <input type="date" id="expense-date" required />
        <button type="submit">Add Expense</button>
      </form>
    </section>

    <!-- Summary -->
    <section id="summary-section" class="card">
      <h2>📊 Summary</h2>
      <div id="summary-totals"></div>
      <h3>⚖️ Who Owes What?</h3>
      <div id="balances"></div>
    </section>

    <!-- Transaction Log -->
    <section id="log-section" class="card">
      <h2>📋 Transaction Log</h2>
      <div class="log-controls">
        <select id="log-filter">
          <option value="all">All Transactions</option>
          <option value="income">Income Only</option>
          <option value="expense">Expenses Only</option>
        </select>
        <button id="clear-all-btn" class="danger">Clear All Data</button>
      </div>
      <table id="log-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Description</th>
            <th>Person</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
      <p id="log-empty" class="empty-msg">No transactions yet.</p>
    </section>
  </main>

  <footer>
    <p>Data is stored locally in your browser.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
